# Minecraft Manager — Nginx reverse proxy configuration
# Copy to /etc/nginx/sites-available/mc-manager and edit server_name.
#
# Quick setup:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/mc-manager
#   sudo ln -s /etc/nginx/sites-available/mc-manager /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d mc.example.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   sudo apt install -y nginx certbot python3-certbot-nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mc.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mc.example.com;

    # Certbot will populate these after running: certbot --nginx -d mc.example.com
    ssl_certificate     /etc/letsencrypt/live/mc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mc.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to the Minecraft Manager panel (bound to 127.0.0.1:3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for live console streaming)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info to the app (requires TRUST_PROXY=1)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — WebSocket connections are long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check endpoint (optional — for upstream monitoring)
    location = /healthz {
        proxy_pass http://127.0.0.1:3000/healthz;
        access_log off;
    }
}
